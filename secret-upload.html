
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Portal - Vconic Media</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f9f9f6; color: #333; }
        :root { --olive-dark: #3b4d2e; --olive-light: #556b2f; --cream: #f4f4eb; --white: #ffffff; }
        
        header { background-color: var(--olive-dark); padding: 20px 50px; text-align: center; color: var(--white); }
        header h1 { font-size: 26px; font-weight: 600; letter-spacing: 2px; }
        
        .form-section { padding: 60px 20px; }
        .form-container { background: var(--white); max-width: 600px; margin: 0 auto; padding: 40px; border-radius: 12px; box-shadow: 0 15px 40px rgba(59, 77, 46, 0.15); border-top: 8px solid var(--olive-light); }
        
        .success-msg { text-align: center; color: #2e7d32; font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .form-container p.subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--olive-dark); }
        input[type="email"], input[type="file"] { width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; background-color: #fafafa; }
        
        .submit-btn { width: 100%; background-color: var(--olive-dark); color: var(--white); border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: var(--olive-light); }
    </style>
</head>
<body>

    <header><h1>VCONIC MEDIA</h1></header>

    <div class="form-section">
        <div class="form-container">
            <div class="success-msg">✅ Payment Successful!</div>
            <p class="subtitle">Submit your media below to start processing.</p>
            
            <form action="https://app.forminit.com/f/xlxevj3la7a" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label>Your Contact Email:</label>
                    <input type="email" name="fi-sender-email" placeholder="Where should we send the video?" required>
                </div>

                <div class="form-group">
                    <label>Upload Your Photo:</label>
                    <input type="file" name="fi-file-photo" accept="image/*" required>
                </div>

                <div class="form-group">
                    <label>Upload Reference Video:</label>
                    <input type="file" name="fi-file-video" accept="video/*" required>
                </div>

                <button type="submit" class="submit-btn">Upload & Generate Video</button>
            </form>

        </div>
    </div>

</body>
</html>
