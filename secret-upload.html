<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal - XWANCO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f9f9f6; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;}
        :root { --olive-dark: #3b4d2e; --olive-light: #556b2f; --cream: #f4f4eb; --white: #ffffff; }
        
        .form-container { background: var(--white); width: 100%; max-width: 500px; padding: 50px 40px; border-radius: 12px; box-shadow: 0 15px 40px rgba(59, 77, 46, 0.15); border-top: 8px solid var(--olive-light); text-align: center; }
        
        .success-msg { color: #2e7d32; font-size: 26px; font-weight: bold; margin-bottom: 15px; }
        .subtitle { color: #555; margin-bottom: 35px; font-size: 16px; line-height: 1.6; }
        
        .upload-btn { display: inline-block; width: 100%; background-color: var(--olive-dark); color: var(--white); text-decoration: none; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 8px; transition: background 0.3s, transform 0.2s; box-shadow: 0 4px 15px rgba(59, 77, 46, 0.3);}
        .upload-btn:hover { background-color: var(--olive-light); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="success-msg">✅ Access Granted!</div>
        <p class="subtitle">Payment Successful. Aapka secure portal unlock ho gaya hai. Niche button par click karein aur apni files direct humare safe Drive me upload karein.</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdDrQtcVP8BxVxVGPbFWb5xZrtZUddg1F6gcWS9yaqs_eLTjA/viewform?usp=dialog" target="_blank" class="upload-btn">Open Upload Portal 🚀</a>
    </div>

</body>
</html>
