<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal - XWANCO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f9f9f6; color: #333; }
        :root { --olive-dark: #3b4d2e; --olive-light: #556b2f; --cream: #f4f4eb; --white: #ffffff; }
        
        header { background-color: var(--olive-dark); padding: 20px 50px; text-align: center; color: var(--white); }
        header h1 { font-size: 26px; font-weight: 600; letter-spacing: 2px; }
        
        .form-section { padding: 60px 20px; display: flex; justify-content: center; }
        .form-container { background: var(--white); width: 100%; max-width: 700px; padding: 40px; border-radius: 12px; box-shadow: 0 15px 40px rgba(59, 77, 46, 0.15); border-top: 8px solid var(--olive-light); }
        
        .success-msg { text-align: center; color: #2e7d32; font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .form-container p.subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        /* IFRAME CONTAINER FOR GOOGLE FORM */
        .iframe-container { width: 100%; display: flex; justify-content: center; overflow: hidden; border-radius: 8px; }
        iframe { width: 100%; max-width: 640px; height: 850px; border: none; }
    </style>
</head>
<body>

    <header><h1>XWANCO MEDIA</h1></header>

    <div class="form-section">
        <div class="form-container">
            <div class="success-msg">✅ Access Granted!</div>
            <p class="subtitle">Submit your heavy files below safely to our secure Drive.</p>
            
            <div class="iframe-container">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdDrQtcVP8BxVxVGPbFWb5xZrtZUddg1F6gcWS9yaqs_eLTjA/viewform?usp=publish-editor" width="640" height="850" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
            </div>

        </div>
    </div>

</body>
</html>
