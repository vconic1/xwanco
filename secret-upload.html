<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 50px; }
        .form-box { background: #333; padding: 30px; border-radius: 10px; width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #556b2f; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box">
        <h3 style="color: #4CAF50; text-align:center;">✅ Payment Successful!</h3>
        <p style="text-align:center;">Ab apni details upload karo:</p>
        
        <form action="https://app.forminit.com/f/xlxevj3la7a" method="POST" enctype="multipart/form-data">
            <label>Your Gmail:</label>
            <input type="email" name="fi-sender-email" required>

            <label>Upload Photo:</label>
            <input type="file" name="fi-file-photo" accept="image/*" required>

            <label>Upload Reference Video:</label>
            <input type="file" name="fi-file-video" accept="video/*" required>

            <button type="submit">Upload Files</button>
        </form>
    </div>
</body>
</html>
